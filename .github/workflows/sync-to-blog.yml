name: Sync Markdown files to blog

on:
  push:
    branches: [ "main" ]
    paths:
      - "lab_doc/**"
      - "diagrams/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (Repo A)
        uses: actions/checkout@v4

      - name: Checkout blog repo (Repo B)
        uses: actions/checkout@v4
        with:
          repository: dannebrob/dannebrob.github.io
          token: ${{ secrets.PAT }}
          path: blog

      - name: Copy images from diagrams/ to blog/images/
        run: |
          mkdir -p blog/images
          if [ -d diagrams ]; then
            cp diagrams/* blog/images/ || true
          fi

      - name: Copy and rewrite MD files from lab_doc/ to blog/_posts/
        run: |
          mkdir -p blog/_posts

          # Plocka ut repo-namn en gång
          repo_name="${{ github.event.repository.name }}"
          pretty_repo=$(echo "$repo_name" | tr '-' ' ' | sed 's/.*/\u&/')

          find lab_doc -type f -name "*.md" | while read file; do
            filename=$(basename "$file")
            dirname=$(basename "$(dirname "$file")")
            cleanname="${filename%.md}"

            # Snygg titel baserat på filnamnet
            pretty_cleanname=$(echo "$cleanname" | tr '-' ' ' | sed 's/.*/\u&/')
            title="$pretty_cleanname ($pretty_repo)"

            # Kategori baserat på undermappen
            category=$(echo "$dirname" | tr '[:upper:]' '[:lower:]')

            # Leta efter befintlig post baserat på source_path
            existing=$(grep -Rl "source_path: \"$file\"" blog/_posts/ || true)

            if [ -n "$existing" ]; then
              echo "Updating existing post: $existing"
              newname=$(basename "$existing")
            else
              newname="$(date +%Y-%m-%d)-$repo_name-$filename"
            fi

            {
              echo "---"
              echo "title: \"$title\""
              echo "categories: [\"$category\"]"
              echo "source_repo: \"$repo_name\""
              echo "source_path: \"$file\""
              echo "---"
              echo
              sed 's#](/diagrams/#](/images/#g' "$file"
            } > "blog/_posts/$newname"
          done
      - name: Commit and push changes to blog
        run: |
          cd blog
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync MD files and images from Repo A" || echo "No changes to commit"
          git push
